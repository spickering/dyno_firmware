#######################################################################
# prj.conf - Low-power BLE NUS for XIAO nRF52840 Sense (NCS v3.3.0)
#
# Goal: minimum standby (System ON idle) current while
#   - advertising every 1.5 s
#   - streaming weight + temperature over NUS once connected
#
# All non-essential peripherals are disabled. Console/UART are off so
# the CPU can hit the WFE idle path and the HFCLK can stop between
# radio events. RTT is also disabled here; turn it on temporarily for
# debug only - it costs current.
#######################################################################

# ---- Bluetooth core -------------------------------------------------
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Bluemax_dev"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_GATT_DYNAMIC_DB=y

# Coded PHY (125 kbps, S=8 FEC) — request after connection if peer supports it.
# BT_PHY_UPDATE enables the procedure; BT_USER_PHY_UPDATE exposes bt_conn_le_phy_update().
# BT_CTLR_PHY_CODED tells the SoftDevice Controller to support Coded PHY on the
# radio — without it the controller rejects PHY update requests silently and
# the link stays on 1M PHY regardless of what the host asks for.
CONFIG_BT_PHY_UPDATE=y
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_CTLR_PHY_CODED=y

# Maximum TX power: +8 dBm (nRF52840 hardware limit).
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ---- Nordic UART Service (peripheral) -------------------------------
CONFIG_BT_NUS=y

# GATT client enables bt_gatt_exchange_mtu() so we can negotiate a larger ATT
# MTU.  Without this, the default ATT MTU is 23 (20-byte payload) which is
# not enough for "P:92 Charge Complete\n" (21 bytes).
CONFIG_BT_GATT_CLIENT=y

# Advertise ATT MTU = 64 in the exchange request so bt_gatt_exchange_mtu()
# negotiates min(64, peer_mtu) >= 64.  ATT payload = 61 bytes, enough for
# the longest P: message "P:100 Charging Inhibited Cold\n" (30 bytes).
# Without this, the request says "my MTU = 23" and negotiation does nothing.
CONFIG_BT_L2CAP_TX_MTU=64

# Explicit pool sizes — belt-and-suspenders against NCS SDC Kconfig overrides.
CONFIG_BT_BUF_ACL_TX_COUNT=6
CONFIG_BT_CONN_TX_MAX=6
CONFIG_BT_ATT_TX_COUNT=6

# ---- Power management ----------------------------------------------
# PM_DEVICE enables pm_device_action_run() used to suspend the QSPI flash.
# System ON idle (WFE) is handled by the idle thread natively on nRF52840;
# CONFIG_PM (SoC-level state transitions) is not needed and not supported
# on this target in NCS v3.3.0.
CONFIG_PM_DEVICE=y

# Tickless kernel is required for the SoC to actually stay asleep
# between events instead of waking up on every system tick.
CONFIG_TICKLESS_KERNEL=y

# Lower the tick rate - reduces the worst-case wake interval the
# kernel may impose. 1 kHz is fine; lower is also OK.
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# ---- Strip everything that costs current ---------------------------
# No console, no shell, no UART.
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_USB_DEVICE_STACK=n
CONFIG_BOOT_BANNER=n
CONFIG_LOG=n
CONFIG_ASSERT=n

# ---- IMU / external flash power-down -------------------------------
# We need device init callbacks to run for the GPIOs and the QSPI
# flash power-down sequence. GPIO driver stays in; QSPI driver too,
# but only briefly so we can issue the DPD command.
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_SPI=y
CONFIG_ADC=y

# QSPI / NOR flash driver - on for one-shot DPD, then we let the
# device get suspended.
CONFIG_FLASH=y
CONFIG_NORDIC_QSPI_NOR=y

# ---- Flash layout (no bootloader) ---------------------------------
# The xiao_ble board default sets CONFIG_USE_DT_CODE_PARTITION=y, which
# reads FLASH_LOAD_OFFSET directly from the DTS chosen/code-partition
# node (0x27000 in nrf52840_partition_uf2_sdv7.dtsi — the UF2 bootloader
# layout).  Disabling it lets the Kconfig values below take effect.
# CONFIG_BUILD_OUTPUT_UF2 is also suppressed; we program via SWD only.
CONFIG_USE_DT_CODE_PARTITION=n
CONFIG_BUILD_OUTPUT_UF2=n
CONFIG_FLASH_LOAD_OFFSET=0x0
CONFIG_FLASH_LOAD_SIZE=0x100000

# ---- Misc ----------------------------------------------------------
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Use the Nordic LL with low-power tweaks
CONFIG_BT_LL_SOFTDEVICE=y
